<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>送信完了｜カーポート専門店 EXたくみ</title>
<meta name="robots" content="noindex" />
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px 20px;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    color: #1a1a1a;
    background: #f7f5f2;
    line-height: 1.8;
  }

  .thanks-card {
    width: min(100%, 640px);
    padding: 40px 28px;
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 18px;
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
    text-align: center;
  }

  .label {
    margin-bottom: 10px;
    color: #6b4f3a;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.18em;
  }

  h1 {
    margin: 0 0 18px;
    font-size: clamp(26px, 7vw, 36px);
    line-height: 1.35;
  }

  p {
    margin: 0 0 24px;
    color: #555;
    font-size: 16px;
  }

  a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 48px;
    padding: 0 24px;
    color: #fff;
    background: #1a1a1a;
    border-radius: 999px;
    font-weight: 700;
    text-decoration: none;
  }
</style>
</head>
<body>
  <main class="thanks-card">
    <div class="label">CONTACT</div>
    <h1>送信完了しました</h1>
    <p>
      お問い合わせありがとうございます。<br>
      内容を確認し、1〜2営業日以内にご連絡します。
    </p>
    <a href="/">トップページへ戻る</a>
  </main>
</body>
</html>
