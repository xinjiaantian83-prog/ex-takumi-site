<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>資材販売カタログ｜EXたくみ</title>
<meta name="description" content="LIXIL 機能門柱FT 宅配ボックス付き、防草シートなど、EXた組が現場目線で選ぶ外構資材の一覧ページです。" />
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;color:#1a1a1a;line-height:1.85;background:#fff}a{text-decoration:none;color:inherit}img{display:block;max-width:100%;height:auto}.header{position:sticky;top:0;background:rgba(255,255,255,.96);border-bottom:1px solid #e5e5e5;z-index:10}.header-inner{max-width:1100px;margin:0 auto;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}.logo{font-weight:700}.nav{display:flex;gap:14px;font-size:13px;color:#555}.section{padding:58px 20px}.container{max-width:1100px;margin:0 auto}.label{font-size:12px;letter-spacing:.18em;color:#6b4f3a;margin-bottom:10px}.title{font-size:30px;line-height:1.35;margin-bottom:16px}.lead{color:#555;margin-bottom:30px;max-width:780px}.products-grid{display:grid;grid-template-columns:1fr;gap:18px}.product-card{border:1px solid #e5e5e5;background:#fff;overflow:hidden}.product-media{aspect-ratio:4/3;background:#f7f5f2;border-bottom:1px solid #e5e5e5}.product-media img{width:100%;height:100%;object-fit:cover}.product-media.is-contain{background:#fff}.product-media.is-contain img{object-fit:contain;padding:10px}.product-body{padding:20px}.product-name{font-size:20px;line-height:1.45;margin-bottom:10px}.product-desc{font-size:14px;color:#555;line-height:1.8;margin-bottom:18px}.btn{display:inline-flex;justify-content:center;align-items:center;min-height:50px;padding:13px 18px;font-weight:700;text-align:center;border-radius:8px;background:#f5efe6;color:#2d241c;border:1px solid #8b735a;box-shadow:0 3px 10px rgba(72,55,38,.12);transition:background-color .18s,border-color .18s,box-shadow .18s,transform .15s}.btn::after{content:"→";margin-left:8px;font-weight:700;transition:transform .18s}.btn:hover{background:#eadfce;border-color:#6b4f3a;box-shadow:0 5px 14px rgba(72,55,38,.16);transform:translateY(-1px)}.btn:hover::after{transform:translateX(3px)}.back-link{display:inline-block;margin-top:28px;color:#555;font-size:13px}@media(min-width:768px){.section{padding:78px 32px}.title{font-size:38px}.products-grid{grid-template-columns:repeat(2,1fr);gap:24px}.product-name{font-size:22px}.product-body{padding:24px}}@media(max-width:520px){.header-inner{align-items:flex-start;gap:10px;flex-direction:column}.nav{flex-wrap:wrap}.title{font-size:28px}.product-body{padding:18px}.btn{width:100%}}
</style>
</head>
<body>
<header class="header"><div class="header-inner"><a class="logo" href="index.html">EXたくみ</a><nav class="nav"><a href="index.html">トップ</a><a href="works.html">施工事例</a><a href="diy.html">DIY応援</a></nav></div></header>
<main class="section">
  <div class="container">
    <div class="label">MATERIAL CATALOG</div>
    <h1 class="title">資材販売カタログ</h1>
    <p class="lead">EXた組が現場目線で選ぶ、施主支給やDIYでも扱いやすい資材一覧です。詳しい価格・販売条件は各商品ページで確認できます。</p>

    <div class="products-grid" id="productsGrid" aria-label="販売中の商品一覧"></div>

    <a class="back-link" href="index.html">トップページへ戻る</a>
  </div>
</main>
<script>
const products = [
  {
    name: 'LIXIL 機能門柱FT 宅配ボックス付き',
    description: 'インターホン、表札、宅配ボックスをまとめて設置できる機能門柱です。',
    image: 'assets/materials/delivery-box-gatepost/scene-entrance.webp',
    imageAlt: 'LIXIL 機能門柱FT 宅配ボックス付きの設置イメージ',
    url: 'gate-ft.html',
  },
  {
    name: '防草シート',
    description: '外構現場で使いやすい高耐久防草シートです。DIY用の道具貸出相談にも対応します。',
    image: 'assets/materials/nax-ex-weed-sheet/product.jpg',
    imageAlt: '防草シートの商品イメージ',
    url: 'weed-sheet.html',
    contain: true,
  },
];

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

document.getElementById('productsGrid').innerHTML = products.map((product) => `
  <article class="product-card">
    <div class="product-media${product.contain ? ' is-contain' : ''}">
      <img src="${escapeHtml(product.image)}" alt="${escapeHtml(product.imageAlt)}" loading="lazy">
    </div>
    <div class="product-body">
      <h2 class="product-name">${escapeHtml(product.name)}</h2>
      <p class="product-desc">${escapeHtml(product.description)}</p>
      <a class="btn" href="${escapeHtml(product.url)}">商品詳細を見る</a>
    </div>
  </article>
`).join('');
</script>
</body>
</html>
